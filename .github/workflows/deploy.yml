name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --- Test / lint / type gate: red = no deploy ---
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Bundle release artifact
        run: |
          tar -czf release.tar.gz \
            dist package.json package-lock.json \
            ecosystem.config.cjs drizzle drizzle.config.ts

      - name: Copy artifact via SCP (password auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT || '22' }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Extract, install prod deps, migrate, reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT || '22' }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf release.tar.gz && rm release.tar.gz
            # better-sqlite3 is a native module — build it for the server arch.
            npm ci --omit=dev
            # Load runtime env (DATABASE_URL, etc.) from the server-side .env so
            # migrations run against the production DB before the new code boots.
            set -a; [ -f .env ] && . ./.env; set +a
            npm run db:migrate
            # Zero-downtime reload; first-ever deploy falls back to start.
            pm2 reload ecosystem.config.cjs --update-env || \
              pm2 start ecosystem.config.cjs
            pm2 save
