name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false # never interrupt an in-flight deploy

env:
  # Pin npm so CI and the VPS resolve the lockfile identically to local dev.
  # ubuntu-latest and the VPS ship npm 10 with Node 22, which resolves the tree
  # differently than the npm 11 that generates the lock — hence `npm ci` used to
  # fail with "Missing: lru-cache@... from lock file". Keep this in sync with
  # package.json "packageManager"/"engines" and your local npm.
  NPM_VERSION: '11.14.1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Match the npm that generated the lockfile (see top-level env).
      - run: npm install -g npm@${{ env.NPM_VERSION }}

      # --- Test / lint / type gate: red = no deploy ---
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Bundle release artifact
        run: |
          tar -czf release.tar.gz \
            .output package.json package-lock.json \
            ecosystem.config.cjs drizzle scripts

      - name: Copy artifact via SCP (password auth)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT || '22' }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: release.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Extract, install prod deps, migrate, reload
        uses: appleboy/ssh-action@v1.0.3
        env:
          # AI provider keys from GitHub Secrets, forwarded to the remote shell
          # (via `envs`) and upserted into the server-side .env below. Leave a
          # secret unset to skip it — a hand-set value in .env is never clobbered.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Same pinned npm as CI/local, so the VPS `npm ci` matches the lockfile.
          NPM_VERSION: ${{ env.NPM_VERSION }}
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT || '22' }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          envs: OPENAI_API_KEY,ANTHROPIC_API_KEY,NPM_VERSION
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf release.tar.gz && rm release.tar.gz

            # Upsert AI provider keys into the persistent, git-ignored .env.
            # Idempotent: drop any existing line for the key, then append the
            # current value (so redeploys don't pile up duplicate lines). Empty
            # (unconfigured) secrets are skipped, never overwriting a manual value.
            touch .env && chmod 600 .env
            upsert_env() {
              [ -z "$2" ] && return 0
              grep -v "^$1=" .env > .env.tmp 2>/dev/null || true
              mv .env.tmp .env
              printf '%s=%s\n' "$1" "$2" >> .env
            }
            upsert_env OPENAI_API_KEY "$OPENAI_API_KEY"
            upsert_env ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"

            # better-sqlite3 is a native module — build it for the server arch.
            # Use the pinned npm via npx (no global install / no sudo needed) so
            # the lockfile resolves the same as CI and local dev.
            npx -y "npm@${NPM_VERSION}" ci --omit=dev
            # Load runtime env (DATABASE_URL, etc.) from the server-side .env so
            # migrations run against the production DB before the new code boots.
            set -a; [ -f .env ] && . ./.env; set +a
            # Runs the drizzle-orm migrator (prod dep), not drizzle-kit (dev).
            npm run db:migrate:prod
            # Zero-downtime reload; first-ever deploy falls back to start.
            pm2 reload ecosystem.config.cjs --update-env || \
              pm2 start ecosystem.config.cjs
            pm2 save
